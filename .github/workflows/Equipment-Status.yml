name: Give notice when most of the organization is asleep.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update the Organization's Status
        shell: bash
        run: |
          FILE="profile/README.md"

          if [ ! -f "$FILE" ]; then
            echo "README not found: $FILE"
            exit 1
          fi

          HOUR=$(TZ=America/Lima date +%H)

          if [ "$HOUR" -ge 23 ] || [ "$HOUR" -lt 7 ]; then
            export NEW_TITLE="# Isolated Labs (Sleeping)"
            export COMMIT_MSG="I'll give you a heads-up when most of the organization is already asleep."
          else
            export NEW_TITLE="# Isolated Labs"
            export COMMIT_MSG="The organization has just woken up"
          fi

          python3 <<PY
          from pathlib import Path
          import os

          file = Path("profile/README.md")
          text = file.read_text(encoding="utf-8")

          old_titles = [
              "# Isolated Labs",
              "# Isolated Labs (Sleeping)"
          ]

          new = os.environ["NEW_TITLE"]

          replaced = False
          for old in old_titles:
              if old in text:
                  text = text.replace(old, new, 1)
                  replaced = True
                  break

          if not replaced and new not in text:
              text = new + "\n\n" + text

          file.write_text(text, encoding="utf-8")
          PY

          echo "COMMIT_MSG=$COMMIT_MSG" >> "$GITHUB_ENV"

      - name: Commit and push
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/README.md
          git commit -m "$COMMIT_MSG"
          git push
